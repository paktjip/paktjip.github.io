<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAKTJIP Digital Printing</title>
        <link rel="stylesheet" href="css/style.css">
		        <link rel="icon" href="favicon.png">

    <script>
        /* ─── CONFIG: tambah fitur baru cukup di sini ─── */
        const MENU_ITEMS = [
            // ── Helpful Tools ──
            { category: "🛠️ Helpful Tools", emoji: "🔄️", label: "Konversi PDF ke Gambar",               file: "pdf_to_img.html" },
			{ category: "🛠️ Helpful Tools", emoji: "📄️", label: "Canva PDF Fixer",              		 file: "canva_pdf.html" },
            { category: "🛠️ Helpful Tools", emoji: "📐",  label: "Hitung Rasio Ukuran Cetak",            file: "kalkulator_ukuran_cetak.html" },
            { category: "🛠️ Helpful Tools", emoji: "✂️",  label: "Hitung Potongan Kertas",               file: "hitung_potong_kertas.html" },
            { category: "🛠️ Helpful Tools", emoji: "📕",  label: "Hitung Ketebalan Punggung Buku",       file: "hitung_punggung_buku.html" },
			{ category: "🛠️ Helpful Tools",  emoji: "🎫",  label: "Generator Nomor Urut Kupon",                    file: "hitung_kupon.html" },

            // ── Administrasi ──
            { category: "📋 Administrasi",  emoji: "📖",  label: "Hitung Harga Buku",                    file: "hitung_harga_buku.html" },
			{ category: "📋 Administrasi",  emoji: "🎫",  label: "Hitung Harga Kupon",                    file: "hitung_kupon.html" },
            { category: "📋 Administrasi",  emoji: "🖼️",  label: "Hitung Harga Spanram",                 file: "hitung_harga_spanram.html" },
            { category: "📋 Administrasi",  emoji: "⚡",  label: "Hitung Jasa Laser Cutting",            file: "hitung_jasa_laser_cutting.html" },
            { category: "📋 Administrasi",  emoji: "🔑",  label: "Hitung Harga Gantungan Kunci Akrilik", file: "hitung_ganci_akrilik.html" },
            { category: "📋 Administrasi",  emoji: "✅",  label: "Template Approval Pesanan",            file: "template_approval_pesanan.html" },
			{ category: "📋 Administrasi",  emoji: "🧾",  label: "Edit Nota",            				file: "edit_nota.html" },
        ];

        /* ─── Auth ─── */
        const PASSWORDS = [
            { hash: "3b9f22265fb9a4281cc63324eb6507ded33a35dfe65b84e7dac044447fb45f82", allowedCategories: null },
            { hash: "a3b526a602e29419b8222bef1fc44519261f4ee9f1c91747ebdcac02e82bfd78", allowedCategories: ["🛠️ Helpful Tools"] },
        ];

        async function h(m) {
            const b  = new TextEncoder().encode(m);
            const hb = await crypto.subtle.digest('SHA-256', b);
            return Array.from(new Uint8Array(hb)).map(x => x.toString(16).padStart(2,'0')).join('');
        }

        async function checkPassword() {
            const p = document.getElementById("password");
            const e = document.getElementById("errorMessage");
            const inputHash = await h(p.value);
            const matched = PASSWORDS.find(pw => pw.hash === inputHash);
            if (matched) {
                localStorage.setItem("auth", "true");
                localStorage.setItem("exp", Date.now() + 30*24*60*60*1000); // 30 hari
                localStorage.setItem("allowedCategories", JSON.stringify(matched.allowedCategories));
                showApp();
            } else {
                e.textContent = "❌ Password salah! Silakan coba lagi.";
                e.classList.add("show");
                p.value = ""; p.focus();
                p.style.animation = "shake 0.5s";
                setTimeout(() => p.style.animation = "", 500);
                setTimeout(() => e.classList.remove("show"), 3000);
            }
        }

        function checkAuth() {
            const auth = localStorage.getItem("auth");
            const exp  = localStorage.getItem("exp");
            if (auth === "true" && exp && Date.now() < parseInt(exp)) showApp();
        }

        function logout() {
            localStorage.removeItem("auth");
            localStorage.removeItem("exp");
            localStorage.removeItem("allowedCategories");
            // Reset tampilan
            document.getElementById("app").style.display = "none";
            document.getElementById("app").classList.remove("show");
            document.getElementById("content-view").classList.remove("show");
            document.getElementById("menu-view").style.display = "block";
            document.body.classList.remove("page-open");
            document.querySelector(".password-container").style.display = "";
            document.getElementById("password").value = "";
            document.getElementById("password").focus();
            // Reset iframe cache
            Object.keys(iframeCache).forEach(k => { iframeCache[k].remove(); delete iframeCache[k]; });
            activeFile = null;
        }

        /* ─── App init ─── */
        function showApp() {
            document.querySelector(".password-container").style.display = "none";
            const app = document.getElementById("app");
            app.style.display = "block";
            app.classList.add("show");
            buildMenu();
        }

        /* ─── Build menu buttons dari MENU_ITEMS ─── */
        function buildMenu() {
            const grid = document.getElementById("links-grid");
            grid.innerHTML = "";

            const allowed = JSON.parse(localStorage.getItem("allowedCategories"));

            const grouped = new Map();
            MENU_ITEMS.forEach(item => {
                if (allowed && !allowed.includes(item.category)) return;
                if (!grouped.has(item.category)) grouped.set(item.category, []);
                grouped.get(item.category).push(item);
            });

            grouped.forEach((items, category) => {
                // Wrapper per kategori — di luar grid
                const section = document.createElement("div");
                section.className = "category-section";

                const label = document.createElement("h3");
                label.className = "category-label";
                label.textContent = category;
                section.appendChild(label);

                const subGrid = document.createElement("div");
                subGrid.className = "links-grid";
                items.forEach(item => {
                    const btn = document.createElement("button");
                    btn.className = "menu-btn";
                    btn.innerHTML = `<span class="emoji">${item.emoji}</span><span class="text">${item.label}</span>`;
                    btn.addEventListener("click", () => openPage(item.file, item.label));
                    subGrid.appendChild(btn);
                });
                section.appendChild(subGrid);
                grid.appendChild(section);
            });
        }

        /* ─── SPA navigation — Opsi C: per-page iframe, hide/show ─── */

        // Map: file → <iframe> element
        const iframeCache = {};
        let activeFile = null;

        function openPage(file, title) {
            document.getElementById("menu-view").style.display = "none";
            document.getElementById("content-view").classList.add("show");
            document.getElementById("page-title").textContent = title;
            document.body.classList.add("page-open"); // kunci scroll body

            // Sembunyikan iframe yang sedang tampil
            if (activeFile && iframeCache[activeFile]) {
                iframeCache[activeFile].style.display = "none";
            }

            if (iframeCache[file]) {
                // Pernah dibuka → tampilkan kembali, semua isian masih ada
                iframeCache[file].style.display = "block";
            } else {
                // Pertama kali → buat iframe baru
                const iframe     = document.createElement("iframe");
                iframe.src       = file;
                iframe.title     = title;
                iframe.onload    = () => {
                    try {
                        // Tinggi iframe mengikuti konten agar container bisa scroll
                        const body = iframe.contentDocument.body;
                        iframe.style.height = Math.max(body.scrollHeight, body.offsetHeight, 500) + "px";
                    } catch(e) {
                        iframe.style.height = "100%";
                    }
                };
                document.getElementById("iframe-container").appendChild(iframe);
                iframeCache[file] = iframe;
            }

            activeFile = file;
            // History API: Back browser → kembali ke menu
            history.pushState({ page: file, title }, "", `#${encodeURIComponent(file)}`);
        }

        function goBack() {
            document.getElementById("content-view").classList.remove("show");
            document.getElementById("menu-view").style.display = "block";
            document.body.classList.remove("page-open"); // lepas kunci scroll body
            // Sembunyikan saja — state di iframe tetap hidup
            if (activeFile && iframeCache[activeFile]) {
                iframeCache[activeFile].style.display = "none";
            }
            activeFile = null;
            history.replaceState(null, "", window.location.pathname);
        }

        /* ─── Boot ─── */
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            document.getElementById("password").addEventListener("keypress", e => {
                if (e.key === "Enter") { e.preventDefault(); checkPassword(); }
            });
            document.getElementById("back-btn").addEventListener("click", goBack);

            // Back button browser
            window.addEventListener("popstate", () => {
                if (document.getElementById("content-view").classList.contains("show")) goBack();
            });

            if (document.querySelector(".password-container").style.display !== "none") {
                document.getElementById("password").focus();
            }
        });
    </script>
</head>
<body class="page-index">

    <!-- PASSWORD SCREEN -->
    <div class="password-container">
        <div class="password-header">
            <h2>🔒 Silakan Masukkan Password</h2>
        </div>
        <div class="password-content">
            <input type="password" id="password" placeholder="Masukkan password" autofocus>
            <div id="errorMessage" class="error-message"></div>
            <button class="password-button" onclick="checkPassword()">Masuk</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app">

        <!-- MENU VIEW -->
        <div id="menu-view">
            <div class="header">
                <button class="logout-btn" onclick="logout()" title="Logout">➜] Logout</button>
                <h1>Utilities</h1>
				<h2>PAKTJIP Digital Printing</h2>
            </div>
            <div class="content">
                <div id="links-grid" class="links-grid">
                    <!-- Diisi oleh buildMenu() -->
                </div>
                <div class="coming-soon">
                    <p>✨ More to coming soon! ✨</p>
                </div>
            </div>
            <footer>
                <strong>Copyright © 2026 PAKTJIP Digital Printing</strong><br>
                Vibe Coded by Lukas Ardianto using Claude AI & Gemini AI
            </footer>
        </div>

        <!-- CONTENT VIEW -->
        <div id="content-view">
            <div class="content-topbar">
                <button id="back-btn">← Kembali</button>
                <span id="page-title"></span>
                <button id="logout-topbar-btn" onclick="logout()" title="Logout">➜] Logout</button>
            </div>
            <div id="iframe-container"></div>
        </div>

    </div>

</body>
</html>
