<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canva PDF Fixer for CorelDRAW</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-canvapdf">

<div class="container container-medium">
    <div class="header">
        <h1>🔧 Canva PDF Fixer</h1>
        <p>Mengatasi masalah kompatibilitas PDF Canva saat dibuka di CorelDRAW.</p>
    </div>

    <div class="content">
        <div class="section-title">Upload File PDF</div>

        <div class="file-info" id="fileInfo">
            <div class="file-icon">📄</div>
            <div class="file-meta">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>
            <button class="btn-icon" onclick="resetTool()" aria-label="Hapus file">✕</button>
        </div>

        <div class="dropzone" id="dropzone" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
            <input type="file" accept=".pdf" onchange="handleFile(this.files[0])" id="fileInput">
            <div class="dropzone-icon">📤</div>
            <h3>Drop file PDF di sini</h3>
            <p>atau klik untuk pilih file</p>
        </div>

        <div class="preview-box" id="previewBox">
            <div class="preview-header">Preview Halaman 1</div>
            <div class="preview-body" id="previewBody">
                <div class="preview-loading">Memuat preview...</div>
            </div>
        </div>

        <div class="diag-box" id="diagBox">
            <div class="diag-header">Hasil Diagnosis</div>
            <div id="diagItems"></div>
        </div>

        <div class="status-box" id="statusBox"></div>

        <button class="calculate-button" id="btnFix" onclick="fixPDF()" style="display:none;">
            ✏️ Perbaiki PDF
        </button>

        <button class="download-button" id="btnDownload" onclick="downloadFixed()">
            ⬇️ Download Hasil
        </button>
    </div>

    <footer>
        <strong>Copyright © 2026 PAKTJIP Digital Printing</strong><br>
        Vibe Coded by Lukas Ardianto using Claude AI
    </footer>
</div>

<script>
let originalBytes = null;
let fixedBytes = null;
let originalFileName = '';

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function onDragOver(e) {
    e.preventDefault();
    document.getElementById('dropzone').classList.add('dragover');
}
function onDragLeave() {
    document.getElementById('dropzone').classList.remove('dragover');
}
function onDrop(e) {
    e.preventDefault();
    document.getElementById('dropzone').classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.name.toLowerCase().endsWith('.pdf')) handleFile(file);
    else showStatus('Hanya file PDF yang didukung.', 'danger');
}

function handleFile(file) {
    if (!file) return;
    originalFileName = file.name;
    const reader = new FileReader();
    reader.onload = e => {
        originalBytes = new Uint8Array(e.target.result);
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
        document.getElementById('fileInfo').style.display = 'flex';
        document.getElementById('dropzone').style.display = 'none';
        document.getElementById('previewBox').style.display = 'block';
        renderPreview(originalBytes);
        diagnose(originalBytes);
        document.getElementById('btnFix').style.display = 'flex';
        document.getElementById('btnDownload').style.display = 'none';
    };
    reader.readAsArrayBuffer(file);
}

async function renderPreview(bytes) {
    const body = document.getElementById('previewBody');
    body.innerHTML = '<div class="preview-loading">Memuat preview...</div>';
    try {
        const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(bytes) }).promise;
        const page = await pdf.getPage(1);

        // Base viewport at scale 1 to get true page dimensions
        const baseViewport = page.getViewport({ scale: 1 });

        // Max display box available inside the preview body (width AND height)
        const maxDisplayWidth = Math.min(body.clientWidth - 32, 500) || 500;
        const maxDisplayHeight = 420;
        const displayScale = Math.min(
            maxDisplayWidth / baseViewport.width,
            maxDisplayHeight / baseViewport.height
        );

        // Render at higher resolution for sharpness, then scale down via CSS
        const dpr = window.devicePixelRatio || 1;
        const renderScale = displayScale * dpr;
        const viewport = page.getViewport({ scale: renderScale });

        const canvas = document.createElement('canvas');
        canvas.width = Math.round(viewport.width);
        canvas.height = Math.round(viewport.height);
        // Lock CSS size explicitly so aspect ratio can't be distorted by layout
        canvas.style.width = Math.round(viewport.width / dpr) + 'px';
        canvas.style.height = Math.round(viewport.height / dpr) + 'px';

        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;

        body.innerHTML = '';
        body.appendChild(canvas);
    } catch (err) {
        body.innerHTML = '<div class="preview-loading">Tidak bisa menampilkan preview (' + err.message + ')</div>';
    }
}

function diagnose(bytes) {
    const str = new TextDecoder('latin1').decode(bytes);
    const checks = [
        {
            label: 'Line ending CRLF setelah stream',
            detail: count => `Ditemukan ${count} stream dengan \\r\\n`,
            count: (str.match(/stream\r\n/g) || []).length,
            bad: c => c > 0
        },
        {
            label: 'Tagged PDF — StructTreeRoot',
            detail: () => 'Struktur aksesibilitas yang tidak dikenali CorelDRAW',
            count: str.includes('/StructTreeRoot') ? 1 : 0,
            bad: c => c > 0
        },
        {
            label: 'XMP Metadata stream',
            detail: () => 'Metadata XML tambahan dari Canva',
            count: str.includes('<?xpacket') ? 1 : 0,
            bad: c => c > 0
        },
        {
            label: 'MarkInfo / Lang',
            detail: () => 'Penanda tagged PDF di catalog',
            count: (str.includes('/MarkInfo') ? 1 : 0) + (str.includes('/Lang') ? 1 : 0),
            bad: c => c > 0
        }
    ];

    const container = document.getElementById('diagItems');
    container.innerHTML = '';
    checks.forEach(c => {
        const isWarn = c.bad(c.count);
        const div = document.createElement('div');
        div.className = 'diag-item';
        div.innerHTML = `
            <div class="diag-dot ${isWarn ? 'warn' : 'ok'}"></div>
            <div>
                <div class="diag-label">${c.label}</div>
                <div class="diag-detail">${isWarn ? c.detail(c.count) : 'Tidak ada masalah'}</div>
            </div>`;
        container.appendChild(div);
    });
    document.getElementById('diagBox').style.display = 'block';
}

function showStatus(msg, type) {
    const box = document.getElementById('statusBox');
    box.className = 'status-box ' + type;
    box.style.display = 'flex';
    box.innerHTML = msg;
}

async function fixPDF() {
    if (!originalBytes) return;
    const btnFix = document.getElementById('btnFix');
    btnFix.disabled = true;
    btnFix.innerHTML = `<span class="spin">⟳</span> Memproses...`;
    showStatus('⏳ Sedang memperbaiki PDF...', 'info');

    try {
        await new Promise(r => setTimeout(r, 40));

        let bytes = fixStreamCRLF(new Uint8Array(originalBytes));

        const { PDFDocument, PDFName } = PDFLib;
        const pdfDoc = await PDFDocument.load(bytes, { ignoreEncryption: true, updateMetadata: false });

        const catalog = pdfDoc.catalog;
        ['Metadata', 'StructTreeRoot', 'MarkInfo', 'Lang', 'ViewerPreferences', 'Outlines'].forEach(key => {
            try { if (catalog.has(PDFName.of(key))) catalog.delete(PDFName.of(key)); } catch(e) {}
        });

        const saved = await pdfDoc.save({ useObjectStreams: false, addDefaultPage: false });
        fixedBytes = fixStreamCRLF(saved);

        const str = new TextDecoder('latin1').decode(fixedBytes);
        const remaining = (str.match(/stream\r\n/g) || []).length;
        const hasStruct = str.includes('/StructTreeRoot');
        const hasXMP = str.includes('<?xpacket');

        let detail = [];
        if (remaining === 0) detail.push('CRLF diperbaiki');
        if (!hasStruct) detail.push('StructTreeRoot dihapus');
        if (!hasXMP) detail.push('XMP dihapus');

        showStatus('✅ Selesai — ' + detail.join(', '), 'success');
        btnFix.style.display = 'none';
        document.getElementById('btnDownload').style.display = 'flex';

    } catch(err) {
        showStatus('❌ Gagal: ' + err.message, 'danger');
        btnFix.disabled = false;
        btnFix.innerHTML = '✏️ Coba Lagi';
    }
}

function fixStreamCRLF(bytes) {
    const pat = [115,116,114,101,97,109,13,10];
    const repl = [115,116,114,101,97,109,10];
    const out = [];
    let i = 0;
    while (i < bytes.length) {
        let match = i + pat.length <= bytes.length;
        if (match) {
            for (let j = 0; j < pat.length; j++) {
                if (bytes[i+j] !== pat[j]) { match = false; break; }
            }
        }
        if (match) { for (const b of repl) out.push(b); i += pat.length; }
        else { out.push(bytes[i++]); }
    }
    return new Uint8Array(out);
}

function downloadFixed() {
    if (!fixedBytes) return;
    const blob = new Blob([fixedBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = originalFileName.replace(/\.pdf$/i, '') + '_fixed.pdf';
    a.click();
    URL.revokeObjectURL(url);
}

function resetTool() {
    originalBytes = null; fixedBytes = null; originalFileName = '';
    document.getElementById('fileInfo').style.display = 'none';
    document.getElementById('previewBox').style.display = 'none';
    document.getElementById('diagBox').style.display = 'none';
    document.getElementById('statusBox').style.display = 'none';
    document.getElementById('btnFix').style.display = 'none';
    document.getElementById('btnFix').disabled = false;
    document.getElementById('btnFix').innerHTML = '✏️ Perbaiki PDF';
    document.getElementById('dropzone').style.display = 'block';
    document.getElementById('fileInput').value = '';
}

// Dark Mode Auto-Sync
(function() {
    function syncDarkMode() {
        const isDark = localStorage.getItem('darkMode') === 'true';
        document.body.classList.toggle('dark-mode', isDark);
        const sw = document.getElementById('darkModeSwitch');
        if (sw) sw.classList.toggle('active', isDark);
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', syncDarkMode);
    } else {
        syncDarkMode();
    }
    window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'DARK_MODE') {
            document.body.classList.toggle('dark-mode', e.data.isDark);
            const sw = document.getElementById('darkModeSwitch');
            if (sw) sw.classList.toggle('active', e.data.isDark);
        }
    });
    window.addEventListener('storage', (e) => {
        if (e.key === 'darkMode') syncDarkMode();
    });
    setInterval(syncDarkMode, 300);
})();
</script>
</body>
</html>
